<svg xmlns="http://www.w3.org/2000/svg" width="680" height="330" viewBox="0 0 680 330" role="img" aria-label="El Enjambre — red distribuida de sensores CipherSentry">
  <title>El Enjambre — red distribuida de sensores</title>
  <rect width="680" height="330" fill="#0d1117"/>

  <!-- Título -->
  <text x="340" y="34" text-anchor="middle" fill="#e6edf3" font-family="-apple-system,sans-serif" font-size="15" font-weight="700">El Enjambre</text>
  <text x="340" y="52" text-anchor="middle" fill="#8b949e" font-family="-apple-system,sans-serif" font-size="11">Red distribuida · cada sensor alimenta la inteligencia central</text>

  <!-- Líneas de conexión (debajo de los nodos) -->
  <line x1="170" y1="113" x2="314" y2="168" stroke="#008a57" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.65"/>
  <line x1="510" y1="113" x2="366" y2="168" stroke="#008a57" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.65"/>
  <line x1="170" y1="243" x2="314" y2="196" stroke="#008a57" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.65"/>
  <line x1="510" y1="243" x2="366" y2="196" stroke="#008a57" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.65"/>

  <!-- API → Dashboard -->
  <line x1="340" y1="210" x2="340" y2="271" stroke="#00ff88" stroke-width="2" opacity="0.85"/>

  <!-- Puntos de flujo de datos (estáticos) -->
  <circle cx="242" cy="141" r="3.5" fill="#008a57"/>
  <circle cx="438" cy="141" r="3.5" fill="#008a57"/>
  <circle cx="242" cy="220" r="3.5" fill="#008a57"/>
  <circle cx="438" cy="220" r="3.5" fill="#008a57"/>
  <circle cx="340" cy="240" r="3.5" fill="#00ff88"/>

  <!-- ── Sensor NW ──────────────────────────────────── -->
  <rect x="70" y="84" width="100" height="58" rx="8" fill="#161b22" stroke="#008a57" stroke-width="1.5"/>
  <!-- mini hexagon icon -->
  <path d="M120,93 L126.93,97 L126.93,105 L120,109 L113.07,105 L113.07,97 Z" fill="#008a57" fill-opacity="0.15" stroke="#008a57" stroke-width="1.2"/>
  <circle cx="120" cy="101" r="3" stroke="#008a57" stroke-width="1" fill="none"/>
  <circle cx="120" cy="101" r="1.2" fill="#008a57"/>
  <text x="120" y="124" text-anchor="middle" fill="#e6edf3" font-family="-apple-system,sans-serif" font-size="11" font-weight="600">Sensor 1</text>
  <text x="120" y="137" text-anchor="middle" fill="#8b949e" font-family="-apple-system,sans-serif" font-size="10">EU · Frankfurt</text>

  <!-- ── Sensor NE ──────────────────────────────────── -->
  <rect x="510" y="84" width="100" height="58" rx="8" fill="#161b22" stroke="#008a57" stroke-width="1.5"/>
  <path d="M560,93 L566.93,97 L566.93,105 L560,109 L553.07,105 L553.07,97 Z" fill="#008a57" fill-opacity="0.15" stroke="#008a57" stroke-width="1.2"/>
  <circle cx="560" cy="101" r="3" stroke="#008a57" stroke-width="1" fill="none"/>
  <circle cx="560" cy="101" r="1.2" fill="#008a57"/>
  <text x="560" y="124" text-anchor="middle" fill="#e6edf3" font-family="-apple-system,sans-serif" font-size="11" font-weight="600">Sensor 2</text>
  <text x="560" y="137" text-anchor="middle" fill="#8b949e" font-family="-apple-system,sans-serif" font-size="10">US · Virginia</text>

  <!-- ── Sensor SW ──────────────────────────────────── -->
  <rect x="70" y="214" width="100" height="58" rx="8" fill="#161b22" stroke="#008a57" stroke-width="1.5"/>
  <path d="M120,223 L126.93,227 L126.93,235 L120,239 L113.07,235 L113.07,227 Z" fill="#008a57" fill-opacity="0.15" stroke="#008a57" stroke-width="1.2"/>
  <circle cx="120" cy="231" r="3" stroke="#008a57" stroke-width="1" fill="none"/>
  <circle cx="120" cy="231" r="1.2" fill="#008a57"/>
  <text x="120" y="254" text-anchor="middle" fill="#e6edf3" font-family="-apple-system,sans-serif" font-size="11" font-weight="600">Sensor 3</text>
  <text x="120" y="267" text-anchor="middle" fill="#8b949e" font-family="-apple-system,sans-serif" font-size="10">AS · Singapur</text>

  <!-- ── Sensor SE ──────────────────────────────────── -->
  <rect x="510" y="214" width="100" height="58" rx="8" fill="#161b22" stroke="#008a57" stroke-width="1.5"/>
  <path d="M560,223 L566.93,227 L566.93,235 L560,239 L553.07,235 L553.07,227 Z" fill="#008a57" fill-opacity="0.15" stroke="#008a57" stroke-width="1.2"/>
  <circle cx="560" cy="231" r="3" stroke="#008a57" stroke-width="1" fill="none"/>
  <circle cx="560" cy="231" r="1.2" fill="#008a57"/>
  <text x="560" y="254" text-anchor="middle" fill="#e6edf3" font-family="-apple-system,sans-serif" font-size="11" font-weight="600">Sensor 4</text>
  <text x="560" y="267" text-anchor="middle" fill="#8b949e" font-family="-apple-system,sans-serif" font-size="10">EU · Madrid</text>

  <!-- ── Shell API central (hexágono) ──────────────── -->
  <path d="M340,152 L366,167 L366,197 L340,212 L314,197 L314,167 Z" fill="#008a57" fill-opacity="0.10" stroke="#008a57" stroke-width="2"/>
  <circle cx="340" cy="182" r="10" stroke="#008a57" stroke-width="1.8" fill="none"/>
  <circle cx="340" cy="182" r="3.8" fill="#008a57"/>
  <text x="340" y="230" text-anchor="middle" fill="#008a57" font-family="-apple-system,sans-serif" font-size="11" font-weight="600">Shell API</text>

  <!-- ── Dashboard ──────────────────────────────────── -->
  <rect x="225" y="271" width="230" height="46" rx="8" fill="#0a1a12" stroke="#00ff88" stroke-width="1.5"/>
  <text x="340" y="291" text-anchor="middle" fill="#00ff88" font-family="-apple-system,sans-serif" font-size="11" font-weight="600">Dashboard</text>
  <text x="340" y="307" text-anchor="middle" fill="#8b949e" font-family="-apple-system,sans-serif" font-size="10">app.ciphersentry.yoire.com</text>
</svg>
